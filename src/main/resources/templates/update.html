<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>更新画面</title>
</head>
<body>
    <h1>更新</h1>
    <form th:action="@{/doUpdate}" th:object="${userForm}" method="post">
        <p>
			ID: <span th:field="*{id}"></span></p>
        <input type="hidden" th:field="*{id}">
                
        <p>
			名前: <input type="text" th:field="*{name}"><br>
			<span th:if="${#fields.hasErrors('name')}"
					th:errors="*{name}">
			</span>
        </p>     
                <p>
			年齢: <input type="number" th:field="*{age}"><br>
			<span th:if="${#fields.hasErrors('age')}"
					th:errors="*{age}">
			</span>
		</p>
		<p>
			メッセージ:
			<input type="text" th:field="*{message}"><br>
			<span th:if="${#fields.hasErrors('message')}"
					th:errors="*{message}">
			</span>
		</p>
        <button type="submit">更新</button>
    </form>
</body>
</html>
